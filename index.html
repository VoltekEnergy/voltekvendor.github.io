    <script>
      // The PWA service worker caused stale deploys on GitHub Pages. Retire it:
      // unregister any previously-installed worker and clear its caches so the browser
      // always loads the newest build. (The Android app bundles its own assets, unaffected.)
      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.getRegistrations().then(rs => rs.forEach(r => r.unregister())).catch(() => {});
      }
      if (window.caches && caches.keys) {
        caches.keys().then(ks => ks.forEach(k => caches.delete(k))).catch(() => {});
      }
